name: ci

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (balkan smoke)
        run: npm run build:balkan
