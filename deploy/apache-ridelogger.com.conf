# RideLogger marketing (global, default DE) — HTTP → HTTPS
# Na serveru: /etc/apache2/sites-available/ridelogger.com.conf
# Docroot: /var/www/ridelogger-site-global (sadržaj Astro dist/ nakon rsync-a)
#
# Certbot obično dodaje RewriteRule ka HTTPS (kao ispod). Ako koristiš samo Redirect,
# ukloni DocumentRoot sa :80 ili ostavi usklađeno sa produkcijom.

<VirtualHost *:80>
    ServerName www.ridelogger.com
    ServerAlias ridelogger.com
    ServerAdmin webmaster@ridelogger.com
    DocumentRoot /var/www/ridelogger-site-global

    <Directory /var/www/ridelogger-site-global/>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ridelogger.com.error.log
    CustomLog ${APACHE_LOG_DIR}/ridelogger.com.access.log combined

    <IfModule mod_dir.c>
        DirectoryIndex index.html
    </IfModule>

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =www.ridelogger.com [OR]
    RewriteCond %{SERVER_NAME} =ridelogger.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
