# RideLogger marketing (global, default DE) — HTTPS
# Na serveru: /etc/apache2/sites-available/ridelogger.com-le-ssl.conf
# Sertifikati: Let’s Encrypt (ime u live/ može biti ridelogger.com — proveri posle certbot-a)

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName www.ridelogger.com
    ServerAlias ridelogger.com
    ServerAdmin webmaster@ridelogger.com

    DocumentRoot /var/www/ridelogger-site-global

    <Directory /var/www/ridelogger-site-global/>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <IfModule mod_dir.c>
        DirectoryIndex index.html
    </IfModule>

    # Kanonski host: apex → www
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^ridelogger\.com$ [NC]
    RewriteRule ^ https://www.ridelogger.com%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/ridelogger.com.error.log
    CustomLog ${APACHE_LOG_DIR}/ridelogger.com.access.log combined

    SSLEngine on
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/ridelogger.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/ridelogger.com/privkey.pem
</VirtualHost>
</IfModule>
